# ===============================================================
# Cấu hình Hệ thống Spring Boot
# ===============================================================
spring:
  application:
    name: FastQC
  
  # Cấu hình upload file
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
      file-size-threshold: 2KB

# ===============================================================
# Cấu hình Server & Java
# ===============================================================
server:
  port: 8888

java:
  awt:
    headless: true

# ===============================================================
# Cấu hình Swagger (OpenAPI) cho Spring Boot 3
# ===============================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: alpha
    # Giúp ghi nhớ các tham số test trên giao diện
    display-request-duration: true 

# ===============================================================
# Cấu hình tùy chỉnh cho Logic FastQC (Ánh xạ vào FastQCProperties.java)
# ===============================================================
fastqc:
  upload-dir: "data/uploads"
  max-file-size: 104857600 # 100MB (Giới hạn logic riêng nếu cần)
  thread-count: 4
  logging:
    level: "INFO"
    path: "logs/fastqc"